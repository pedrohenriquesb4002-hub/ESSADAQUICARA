<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPED Intelligence | Enterprise Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .gradient-bg { background: radial-gradient(circle at top right, #e2e8f0, #f8fafc); }
        .drop-zone--over { border-color: #3b82f6; background: #eff6ff; transform: scale(1.01); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen">

    <nav class="border-b border-slate-200 bg-white/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-blue-200 shadow-lg">
                    <span class="text-white font-bold text-xl">S</span>
                </div>
                <span class="text-slate-900 font-bold text-lg tracking-tight">SPED<span class="text-blue-600 font-light italic">Core</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-20 px-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight sm:text-5xl mb-4">Conversão de Inventário EFD</h1>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">Interface corporativa para extração automática de dados SPED (0200/H010).</p>
        </div>

        <div class="glass border border-slate-200 rounded-3xl p-8 shadow-2xl relative">
            <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-2xl p-16 flex flex-col items-center justify-center transition-all hover:bg-white/50 group cursor-pointer">
                
                <input type="file" id="fileInput" class="hidden">
                
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                </div>

                <h3 class="text-xl font-semibold text-slate-800 mb-2">Selecione o arquivo SPED</h3>
                <p class="text-slate-400 text-sm mb-6 text-center">Arraste e solte o arquivo aqui ou <span class="text-blue-600 underline">clique para buscar</span></p>
                
                <div id="file-info" class="hidden mb-8 flex items-center gap-3 bg-blue-50 px-5 py-2 rounded-full border border-blue-100">
                    <span class="text-blue-700 text-sm font-bold" id="filename-display"></span>
                    <button type="button" id="remove-file" class="text-blue-400 hover:text-red-500 font-bold ml-2">×</button>
                </div>

                <button type="button" id="process-btn" class="bg-slate-900 text-white px-10 py-4 rounded-xl font-semibold hover:bg-blue-600 hover:shadow-xl transition-all flex items-center gap-3 disabled:bg-slate-400">
                    <span id="btn-text">Gerar Relatório Excel</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('process-btn');
        const loader = document.getElementById('loader');
        const fileInfo = document.getElementById('file-info');
        const filenameDisplay = document.getElementById('filename-display');
        const btnText = document.getElementById('btn-text');

        // FORÇA O CLIQUE NO INPUT QUANDO CLICAR NA ZONA
        dropZone.addEventListener('click', (e) => {
            // Evita que o clique no botão de remover ou processar acione o seletor de novo
            if (e.target.closest('button')) return;
            fileInput.click();
        });

        // DRAG AND DROP
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone--over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileInfo();
            }
        });

        fileInput.addEventListener('change', updateFileInfo);

        function updateFileInfo() {
            if (fileInput.files.length > 0) {
                filenameDisplay.innerText = fileInput.files[0].name;
                fileInfo.classList.remove('hidden');
                btnText.innerText = "Pronto para Converter";
            }
        }

        document.getElementById('remove-file').addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.value = "";
            fileInfo.classList.add('hidden');
            btnText.innerText = "Gerar Relatório Excel";
        });

        // ENVIO REAL PARA O FLASK
        processBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!fileInput.files[0]) {
                alert("Por favor, selecione um arquivo primeiro!");
                return;
            }

            processBtn.disabled = true;
            loader.style.display = "block";
            btnText.innerText = "Processando...";

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/convert', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Erro no processamento");

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileInput.files[0].name.replace(".txt", ".xlsx");
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                btnText.innerText = "Download Concluído!";
            } catch (err) {
                alert("Erro ao converter arquivo.");
                btnText.innerText = "Tentar Novamente";
            } finally {
                processBtn.disabled = false;
                loader.style.display = "none";
            }
        });
    </script>
</body>
</html>
